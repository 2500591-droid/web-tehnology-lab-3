<!DOCTYPE html>
<html>
<head>
    <title>Attractive Calculator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            color: white;
        }

        .calculator h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        .buttons {
            margin-top: 10px;
        }

        button {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .add { background: #1cc88a; }
        .sub { background: #e74a3b; }
        .mul { background: #36b9cc; }
        .div { background: #f6c23e; color: black; }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>Modern Calculator</h2>

        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">

        <div class="buttons">
            <button class="add" onclick="calculate('+')">Add</button>
            <button class="sub" onclick="calculate('-')">Subtract</button>
            <button class="mul" onclick="calculate('*')">Multiply</button>
            <button class="div" onclick="calculate('/')">Divide</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function calculate(operator) {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            var resultBox = document.getElementById("result");

            if (n1 === "" || n2 === "") {
                resultBox.innerHTML = "Error: Please enter both numbers";
                resultBox.style.color = "#ff4d4d";
                return;
            }

            n1 = parseFloat(n1);
            n2 = parseFloat(n2);
            var result;

            if (operator === "+") {
                result = n1 + n2;
            } 
            else if (operator === "-") {
                result = n1 - n2;
            } 
            else if (operator === "*") {
                result = n1 * n2;
            } 
            else if (operator === "/") {
                if (n2 === 0) {
                    resultBox.innerHTML = "Error: Cannot divide by zero";
                    resultBox.style.color = "#ff4d4d";
                    return;
                }
                result = n1 / n2;
            }

            resultBox.innerHTML = "Result: " + result;
            resultBox.style.color = "#00ffcc";
        }
    </script>

</body>
</html>
